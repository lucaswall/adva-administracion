# Nixpacks defaults to nodejs_18 and its built-in nixpkgs archive doesn't carry
# nodejs_24, so auto-detection from engines.node / .node-version / .nvmrc falls
# through silently. Override the setup phase explicitly with a nixos-25.05
# channel commit (that channel makes nodejs_24 the default Node major).
[phases.setup]
nixPkgs = ["nodejs_24"]
nixpkgsArchive = "ac62194c3917d5f474c1a844b6fd6da2db95077d"

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build", "npm prune --omit=dev"]

[start]
cmd = "npm start"
